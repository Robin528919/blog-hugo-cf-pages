<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Noto Sans CJK SC,system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gear/settings pattern -->
  <g opacity="0.05">
    <circle cx="950" cy="200" r="120" stroke="#8b5cf6" stroke-width="3" fill="none"/>
    <circle cx="950" cy="200" r="80" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="950" cy="200" r="40" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <line x1="950" y1="60" x2="950" y2="340" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="810" y1="200" x2="1090" y2="200" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="855" y1="105" x2="1045" y2="295" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="1045" y1="105" x2="855" y2="295" stroke="#8b5cf6" stroke-width="2"/>
  </g>

  <!-- Decorative nodes -->
  <g opacity="0.08">
    <circle cx="850" cy="420" r="8" fill="#3b82f6"/>
    <circle cx="950" cy="450" r="6" fill="#8b5cf6"/>
    <circle cx="1050" cy="400" r="10" fill="#3b82f6"/>
    <line x1="850" y1="420" x2="950" y2="450" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="950" y1="450" x2="1050" y2="400" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="850" y1="420" x2="1050" y2="400" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4"/>
  </g>

  <!-- Tag -->
  <rect x="60" y="120" width="190" height="36" rx="18" fill="url(#accent)" opacity="0.15"/>
  <text x="155" y="144" fill="#8b5cf6" font-size="16" font-weight="600" text-anchor="middle">OpenClaw 完整指南</text>

  <!-- Title -->
  <text x="60" y="210" fill="#ffffff" font-size="48" font-weight="800" letter-spacing="-1">
    <tspan x="60" dy="0">对话与角色设置</tspan>
    <tspan x="60" dy="65">从身份定义到多智能体管理</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="340" fill="#94a3b8" font-size="20">SOUL.md · 角色定义 · 多 Agent 协作 · 渠道配置</text>

  <!-- Feature cards -->
  <g transform="translate(60, 390)">
    <rect width="200" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="100" y="38" fill="#3b82f6" font-size="28" font-weight="800" text-anchor="middle">SOUL.md</text>
    <text x="100" y="65" fill="#64748b" font-size="15" text-anchor="middle">角色灵魂配置</text>
  </g>
  <g transform="translate(280, 390)">
    <rect width="200" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="100" y="38" fill="#8b5cf6" font-size="28" font-weight="800" text-anchor="middle">Multi-Agent</text>
    <text x="100" y="65" fill="#64748b" font-size="15" text-anchor="middle">多智能体管理</text>
  </g>
  <g transform="translate(500, 390)">
    <rect width="200" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="100" y="38" fill="#22c55e" font-size="28" font-weight="800" text-anchor="middle">10+ 渠道</text>
    <text x="100" y="65" fill="#64748b" font-size="15" text-anchor="middle">全平台接入</text>
  </g>

  <!-- Lobster icon -->
  <g transform="translate(850, 390)">
    <circle cx="70" cy="45" r="55" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" opacity="0.8"/>
    <text x="70" y="62" font-size="50" text-anchor="middle">🦞</text>
  </g>

  <!-- Brand -->
  <text x="60" y="545" fill="#475569" font-size="16">OpenClaw · AI 智能体配置完整手册</text>
  <text x="60" y="575" fill="#334155" font-size="14">blog.es007.com</text>
</svg>
