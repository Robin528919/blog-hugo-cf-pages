<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1000" height="600" fill="#0f172a"/>

  <!-- Title -->
  <text x="500" y="45" fill="#ffffff" font-size="24" font-weight="700" text-anchor="middle">电商上架的恶性循环</text>

  <!-- Center cycle - 4 nodes in a circle -->
  <!-- Node 1: 效率低下 (top) -->
  <g transform="translate(500, 130)">
    <rect x="-90" y="-30" width="180" height="60" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="0" y="5" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">效率低下</text>
  </g>

  <!-- Node 2: 加人 (right) -->
  <g transform="translate(740, 250)">
    <rect x="-90" y="-30" width="180" height="60" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
    <text x="0" y="5" fill="#f97316" font-size="18" font-weight="700" text-anchor="middle">加人解决</text>
  </g>

  <!-- Node 3: 沟通成本 (bottom) -->
  <g transform="translate(500, 370)">
    <rect x="-90" y="-30" width="180" height="60" rx="12" fill="#1e293b" stroke="#eab308" stroke-width="2"/>
    <text x="0" y="5" fill="#eab308" font-size="18" font-weight="700" text-anchor="middle">沟通成本暴增</text>
  </g>

  <!-- Node 4: 出错 (left) -->
  <g transform="translate(260, 250)">
    <rect x="-90" y="-30" width="180" height="60" rx="12" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
    <text x="0" y="5" fill="#f43f5e" font-size="18" font-weight="700" text-anchor="middle">员工频繁出错</text>
  </g>

  <!-- Arrows connecting the cycle -->
  <!-- Top → Right -->
  <path d="M590 145 Q680 160 650 230" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- Right → Bottom -->
  <path d="M680 280 Q660 340 590 365" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- Bottom → Left -->
  <path d="M410 365 Q330 340 320 280" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- Left → Top -->
  <path d="M320 220 Q330 160 410 140" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Center label -->
  <text x="500" y="255" fill="#ef4444" font-size="16" font-weight="600" text-anchor="middle" opacity="0.6">恶性循环</text>

  <!-- Descending consequences -->
  <!-- Arrow down from cycle -->
  <line x1="500" y1="400" x2="500" y2="440" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>

  <g transform="translate(500, 470)">
    <rect x="-120" y="-22" width="240" height="44" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="0" y="5" fill="#ef4444" font-size="16" font-weight="600" text-anchor="middle">人力成本持续上涨</text>
  </g>

  <line x1="500" y1="492" x2="500" y2="520" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>

  <g transform="translate(500, 550)">
    <rect x="-150" y="-22" width="300" height="44" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="0" y="5" fill="#ef4444" font-size="16" font-weight="600" text-anchor="middle">竞争对手用工具提速，你还在加人</text>
  </g>

  <!-- Break the cycle label -->
  <g transform="translate(860, 470)">
    <rect x="-80" y="-45" width="160" height="90" rx="12" fill="#022c22" stroke="#22c55e" stroke-width="2"/>
    <image href="/images/shared/pixel-lobster.png" x="-15" y="-30" width="30" height="30"/>
    <text x="0" y="15" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">小龙虾</text>
    <text x="0" y="35" fill="#22c55e" font-size="14" text-anchor="middle">切断循环</text>
  </g>

  <path d="M780 470 L740 350" stroke="#22c55e" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow-green)"/>
</svg>
