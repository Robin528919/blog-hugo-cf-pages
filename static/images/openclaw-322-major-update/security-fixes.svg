<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" font-family="Noto Sans CJK SC, sans-serif">
  <rect width="1000" height="400" fill="#0f172a"/>
  <text x="500" y="40" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">3.22 安全修复总览：10+ 漏洞一次性封堵</text>

  <!-- Card 1: SMB -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="220" height="280" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="45" rx="12" fill="#ef4444" opacity="0.15"/>
    <rect x="0" y="30" width="220" height="15" fill="#ef4444" opacity="0.15"/>
    <text x="110" y="30" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">SMB 凭证泄露</text>
    <text x="110" y="68" fill="#94a3b8" font-size="12" text-anchor="middle">Windows</text>

    <text x="15" y="100" fill="#64748b" font-size="12">攻击方式：</text>
    <text x="15" y="120" fill="#94a3b8" font-size="12">构造 file:// / UNC 路径</text>
    <text x="15" y="140" fill="#94a3b8" font-size="12">触发 SMB 认证握手</text>
    <text x="15" y="160" fill="#94a3b8" font-size="12">窃取 Windows 凭证</text>

    <line x1="15" y1="178" x2="205" y2="178" stroke="#334155" stroke-width="1"/>

    <text x="15" y="200" fill="#22c55e" font-size="12" font-weight="600">修复：</text>
    <text x="15" y="220" fill="#22c55e" font-size="12">媒体加载拦截远程路径</text>
    <text x="15" y="240" fill="#22c55e" font-size="12">沙盒附件路径过滤</text>

    <rect x="15" y="255" width="60" height="20" rx="4" fill="#ef4444" opacity="0.2"/>
    <text x="45" y="269" fill="#ef4444" font-size="11" font-weight="600" text-anchor="middle">严重</text>
  </g>

  <!-- Card 2: Sandbox -->
  <g transform="translate(270, 70)">
    <rect x="0" y="0" width="220" height="280" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="45" rx="12" fill="#f97316" opacity="0.15"/>
    <rect x="0" y="30" width="220" height="15" fill="#f97316" opacity="0.15"/>
    <text x="110" y="30" fill="#f97316" font-size="15" font-weight="700" text-anchor="middle">环境变量注入</text>
    <text x="110" y="68" fill="#94a3b8" font-size="12" text-anchor="middle">跨平台</text>

    <text x="15" y="100" fill="#64748b" font-size="12">攻击方式：</text>
    <text x="15" y="120" fill="#94a3b8" font-size="12">MAVEN_OPTS 注入</text>
    <text x="15" y="140" fill="#94a3b8" font-size="12">GLIBC_TUNABLES 利用</text>
    <text x="15" y="160" fill="#94a3b8" font-size="12">DOTNET_ADDITIONAL_DEPS</text>

    <line x1="15" y1="178" x2="205" y2="178" stroke="#334155" stroke-width="1"/>

    <text x="15" y="200" fill="#22c55e" font-size="12" font-weight="600">修复：</text>
    <text x="15" y="220" fill="#22c55e" font-size="12">封锁 JVM/GLIBC/.NET</text>
    <text x="15" y="240" fill="#22c55e" font-size="12">全部注入路径</text>

    <rect x="15" y="255" width="60" height="20" rx="4" fill="#f97316" opacity="0.2"/>
    <text x="45" y="269" fill="#f97316" font-size="11" font-weight="600" text-anchor="middle">高危</text>
  </g>

  <!-- Card 3: Unicode -->
  <g transform="translate(510, 70)">
    <rect x="0" y="0" width="220" height="280" rx="12" fill="#1e293b" stroke="#eab308" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="45" rx="12" fill="#eab308" opacity="0.15"/>
    <rect x="0" y="30" width="220" height="15" fill="#eab308" opacity="0.15"/>
    <text x="110" y="30" fill="#eab308" font-size="15" font-weight="700" text-anchor="middle">Unicode 审批伪装</text>
    <text x="110" y="68" fill="#94a3b8" font-size="12" text-anchor="middle">网关 + macOS</text>

    <text x="15" y="100" fill="#64748b" font-size="12">攻击方式：</text>
    <text x="15" y="120" fill="#94a3b8" font-size="12">韩文填充码位</text>
    <text x="15" y="140" fill="#94a3b8" font-size="12">零宽字符隐藏命令</text>
    <text x="15" y="160" fill="#94a3b8" font-size="12">审批提示看不到真实内容</text>

    <line x1="15" y1="178" x2="205" y2="178" stroke="#334155" stroke-width="1"/>

    <text x="15" y="200" fill="#22c55e" font-size="12" font-weight="600">修复：</text>
    <text x="15" y="220" fill="#22c55e" font-size="12">全面转义不可见字符</text>
    <text x="15" y="240" fill="#22c55e" font-size="12">网关 + 原生 UI 双重防护</text>

    <rect x="15" y="255" width="60" height="20" rx="4" fill="#eab308" opacity="0.2"/>
    <text x="45" y="269" fill="#eab308" font-size="11" font-weight="600" text-anchor="middle">中危</text>
  </g>

  <!-- Card 4: Webhook -->
  <g transform="translate(750, 70)">
    <rect x="0" y="0" width="220" height="280" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="45" rx="12" fill="#3b82f6" opacity="0.15"/>
    <rect x="0" y="30" width="220" height="15" fill="#3b82f6" opacity="0.15"/>
    <text x="110" y="30" fill="#3b82f6" font-size="15" font-weight="700" text-anchor="middle">Webhook 资源耗尽</text>
    <text x="110" y="68" fill="#94a3b8" font-size="12" text-anchor="middle">公网部署</text>

    <text x="15" y="100" fill="#64748b" font-size="12">攻击方式：</text>
    <text x="15" y="120" fill="#94a3b8" font-size="12">未认证大 body 请求</text>
    <text x="15" y="140" fill="#94a3b8" font-size="12">1MB / 30s 缓冲消耗</text>
    <text x="15" y="160" fill="#94a3b8" font-size="12">服务器资源耗尽</text>

    <line x1="15" y1="178" x2="205" y2="178" stroke="#334155" stroke-width="1"/>

    <text x="15" y="200" fill="#22c55e" font-size="12" font-weight="600">修复：</text>
    <text x="15" y="220" fill="#22c55e" font-size="12">预认证限制 64KB / 5s</text>
    <text x="15" y="240" fill="#22c55e" font-size="12">单 IP 并发请求限制</text>

    <rect x="15" y="255" width="60" height="20" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="45" y="269" fill="#3b82f6" font-size="11" font-weight="600" text-anchor="middle">中危</text>
  </g>

  <!-- Bottom -->
  <rect x="30" y="365" width="940" height="25" rx="4" fill="#022c22"/>
  <text x="500" y="383" fill="#22c55e" font-size="13" font-weight="600" text-anchor="middle">公网部署用户：这一版不是「建议更新」，是「必须更新」</text>
</svg>
