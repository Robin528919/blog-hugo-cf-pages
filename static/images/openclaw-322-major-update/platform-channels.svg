<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" font-family="Noto Sans CJK SC, sans-serif">
  <rect width="1000" height="320" fill="#0f172a"/>
  <text x="500" y="40" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">多平台体验升级一览</text>

  <!-- Android -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="180" height="210" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="40" rx="12" fill="#22c55e" opacity="0.12"/>
    <rect x="0" y="28" width="180" height="12" fill="#22c55e" opacity="0.12"/>
    <text x="90" y="28" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">Android</text>
    <text x="15" y="72" fill="#94a3b8" font-size="12">+ 深色模式全覆盖</text>
    <text x="15" y="96" fill="#94a3b8" font-size="12">+ 圆角滑块自定义</text>
    <text x="15" y="120" fill="#94a3b8" font-size="12">+ 引导/聊天/语音</text>
    <rect x="15" y="180" width="55" height="20" rx="4" fill="#22c55e" opacity="0.2"/>
    <text x="42" y="194" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">UI</text>
  </g>

  <!-- Telegram -->
  <g transform="translate(225, 70)">
    <rect x="0" y="0" width="180" height="210" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="40" rx="12" fill="#3b82f6" opacity="0.12"/>
    <rect x="0" y="28" width="180" height="12" fill="#3b82f6" opacity="0.12"/>
    <text x="90" y="28" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">Telegram</text>
    <text x="15" y="72" fill="#94a3b8" font-size="12">+ 话题自动重命名</text>
    <text x="15" y="96" fill="#94a3b8" font-size="12">+ LLM 生成话题标签</text>
    <text x="15" y="120" fill="#94a3b8" font-size="12">+ 静默错误回复</text>
    <rect x="15" y="180" width="55" height="20" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="42" y="194" fill="#3b82f6" font-size="11" font-weight="600" text-anchor="middle">交互</text>
  </g>

  <!-- 飞书 -->
  <g transform="translate(420, 70)">
    <rect x="0" y="0" width="180" height="210" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="40" rx="12" fill="#8b5cf6" opacity="0.12"/>
    <rect x="0" y="28" width="180" height="12" fill="#8b5cf6" opacity="0.12"/>
    <text x="90" y="28" fill="#8b5cf6" font-size="16" font-weight="700" text-anchor="middle">飞书</text>
    <text x="15" y="72" fill="#94a3b8" font-size="12">+ 审批交互卡片</text>
    <text x="15" y="96" fill="#94a3b8" font-size="12">+ ACP 子智能体绑定</text>
    <text x="15" y="120" fill="#94a3b8" font-size="12">+ 推理流实时渲染</text>
    <rect x="15" y="180" width="55" height="20" rx="4" fill="#8b5cf6" opacity="0.2"/>
    <text x="42" y="194" fill="#8b5cf6" font-size="11" font-weight="600" text-anchor="middle">深度</text>
  </g>

  <!-- 浏览器 -->
  <g transform="translate(615, 70)">
    <rect x="0" y="0" width="180" height="210" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="40" rx="12" fill="#f97316" opacity="0.12"/>
    <rect x="0" y="28" width="180" height="12" fill="#f97316" opacity="0.12"/>
    <text x="90" y="28" fill="#f97316" font-size="16" font-weight="700" text-anchor="middle">浏览器</text>
    <text x="15" y="72" fill="#94a3b8" font-size="12">- Chrome 扩展移除</text>
    <text x="15" y="96" fill="#94a3b8" font-size="12">+ userDataDir 直连</text>
    <text x="15" y="120" fill="#94a3b8" font-size="12">+ Brave/Edge 支持</text>
    <rect x="15" y="180" width="55" height="20" rx="4" fill="#f97316" opacity="0.2"/>
    <text x="42" y="194" fill="#f97316" font-size="11" font-weight="600" text-anchor="middle">重构</text>
  </g>

  <!-- Matrix -->
  <g transform="translate(810, 70)">
    <rect x="0" y="0" width="160" height="210" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#06b6d4" opacity="0.12"/>
    <rect x="0" y="28" width="160" height="12" fill="#06b6d4" opacity="0.12"/>
    <text x="80" y="28" fill="#06b6d4" font-size="16" font-weight="700" text-anchor="middle">Matrix</text>
    <text x="15" y="72" fill="#94a3b8" font-size="12">+ 官方插件上线</text>
    <text x="15" y="96" fill="#94a3b8" font-size="12">+ matrix-js-sdk</text>
    <text x="15" y="120" fill="#94a3b8" font-size="12">+ 开源协议一等公民</text>
    <rect x="15" y="180" width="55" height="20" rx="4" fill="#06b6d4" opacity="0.2"/>
    <text x="42" y="194" fill="#06b6d4" font-size="11" font-weight="600" text-anchor="middle">NEW</text>
  </g>
</svg>
