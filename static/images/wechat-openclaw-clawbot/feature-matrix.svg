      <text x="30" y="0" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="13">图片消息</text>
      <text x="30" y="18" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">多模态分析</text>
    </g>
    <g transform="translate(0, 80)">
      <circle cx="10" cy="-4" r="8" fill="#f59e0b" opacity="0.15"/>
      <text x="10" y="1" text-anchor="middle" fill="#f59e0b" font-family="Noto Sans CJK SC, sans-serif" font-size="12">...</text>
      <text x="30" y="0" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="13">语音消息</text>
      <text x="30" y="18" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">语音转文字 + AI 处理</text>
    </g>
    <g transform="translate(0, 125)">
      <circle cx="10" cy="-4" r="8" fill="#f59e0b" opacity="0.15"/>
      <text x="10" y="1" text-anchor="middle" fill="#f59e0b" font-family="Noto Sans CJK SC, sans-serif" font-size="12">...</text>
      <text x="30" y="0" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="13">文件处理</text>
      <text x="30" y="18" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">文档解析</text>
    </g>
    <g transform="translate(0, 170)">
      <circle cx="10" cy="-4" r="8" fill="#f59e0b" opacity="0.15"/>
      <text x="10" y="1" text-anchor="middle" fill="#f59e0b" font-family="Noto Sans CJK SC, sans-serif" font-size="12">...</text>
      <text x="30" y="0" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="13">Android 支持</text>
      <text x="30" y="18" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">即将推出</text>
    </g>
