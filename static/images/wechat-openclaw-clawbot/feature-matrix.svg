<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="380" fill="url(#bg3)"/>
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700">ClawBot 功能矩阵</text>
  <!-- Supported section -->
  <g transform="translate(100, 80)">
    <text x="0" y="0" fill="#22c55e" font-family="Noto Sans CJK SC, sans-serif" font-size="15" font-weight="600">已支持</text>
    <line x1="0" y1="10" x2="280" y2="10" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
    <!-- Items -->
    <g transform="translate(0, 35)">
      <circle cx="10" cy="-4" r="8" fill="#22c55e" opacity="0.15"/>
      <text x="10" y="0" text-anchor="middle" fill="#22c55e" font-family="Noto Sans CJK SC, sans-serif" font-size="14">&#10003;</text>
      <text x="30" y="0" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="13">文字消息</text>
      <text x="30" y="18" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">私聊 + 群聊</text>
    </g>
    <g transform="translate(0, 80)">
      <circle cx="10" cy="-4" r="8" fill="#22c55e" opacity="0.15"/>
      <text x="10" y="0" text-anchor="middle" fill="#22c55e" font-family="Noto Sans CJK SC, sans-serif" font-size="14">&#10003;</text>
      <text x="30" y="0" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="13">群聊 @召唤</text>
      <text x="30" y="18" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">头脑风暴 / 翻译 / 问答</text>
    </g>
    <g transform="translate(0, 125)">
      <circle cx="10" cy="-4" r="8" fill="#22c55e" opacity="0.15"/>
      <text x="10" y="0" text-anchor="middle" fill="#22c55e" font-family="Noto Sans CJK SC, sans-serif" font-size="14">&#10003;</text>
      <text x="30" y="0" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="13">远程任务下发</text>
      <text x="30" y="18" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">手机遥控 OpenClaw 执行任务</text>
    </g>
    <g transform="translate(0, 170)">
      <circle cx="10" cy="-4" r="8" fill="#22c55e" opacity="0.15"/>
      <text x="10" y="0" text-anchor="middle" fill="#22c55e" font-family="Noto Sans CJK SC, sans-serif" font-size="14">&#10003;</text>
      <text x="30" y="0" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="13">iOS 8.0.70+</text>
      <text x="30" y="18" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">官方插件体系</text>
    </g>
