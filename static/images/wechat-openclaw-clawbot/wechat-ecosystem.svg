<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="420" fill="url(#bg4)"/>
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700">微信生态 x OpenClaw 接入路径</text>
  <!-- Central OpenClaw node -->
  <g transform="translate(450, 200)">
    <circle cx="0" cy="0" r="50" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#ef4444" font-family="Noto Sans CJK SC, sans-serif" font-size="15" font-weight="700">OpenClaw</text>
    <text x="0" y="15" text-anchor="middle" fill="#94a3b8" font-family="Noto Sans CJK SC, sans-serif" font-size="10">网关</text>
  </g>
  <!-- Path 1: ClawBot (Personal WeChat) - Top left -->
  <g>
    <line x1="400" y1="165" x2="200" y2="100" stroke="#07c160" stroke-width="1.5"/>
    <g transform="translate(140, 90)">
      <rect x="-70" y="-30" width="140" height="70" rx="8" fill="#1e293b" stroke="#07c160" stroke-width="1.5"/>
      <text x="0" y="-8" text-anchor="middle" fill="#07c160" font-family="Noto Sans CJK SC, sans-serif" font-size="13" font-weight="600">ClawBot</text>
      <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-family="Noto Sans CJK SC, sans-serif" font-size="10">个人微信</text>
      <text x="0" y="25" text-anchor="middle" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="9">iOS 8.0.70+ | 仅文字</text>
    </g>
  </g>
  <!-- Path 2: Enterprise WeChat - Top right -->
  <g>
    <line x1="500" y1="165" x2="700" y2="100" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(760, 90)">
      <rect x="-70" y="-30" width="140" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="0" y="-8" text-anchor="middle" fill="#3b82f6" font-family="Noto Sans CJK SC, sans-serif" font-size="13" font-weight="600">企业微信 API</text>
      <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-family="Noto Sans CJK SC, sans-serif" font-size="10">企业微信</text>
      <text x="0" y="25" text-anchor="middle" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="9">MCP | 文档 | 日程 | 会议</text>
    </g>
  </g>
  <!-- Path 3: Third-party plugins - Bottom left -->
  <g>
    <line x1="400" y1="235" x2="200" y2="310" stroke="#a855f7" stroke-width="1.5"/>
    <g transform="translate(140, 320)">
      <rect x="-70" y="-30" width="140" height="70" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
      <text x="0" y="-8" text-anchor="middle" fill="#a855f7" font-family="Noto Sans CJK SC, sans-serif" font-size="13" font-weight="600">社区方案</text>
      <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-family="Noto Sans CJK SC, sans-serif" font-size="10">openclaw-china</text>
      <text x="0" y="25" text-anchor="middle" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="9">微信客服 | 公众号 | QQ</text>
    </g>
  </g>
  <!-- Path 4: Tencent AI Suite - Bottom right -->
  <g>
    <line x1="500" y1="235" x2="700" y2="310" stroke="#f59e0b" stroke-width="1.5"/>
    <g transform="translate(760, 320)">
      <rect x="-70" y="-30" width="140" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="0" y="-8" text-anchor="middle" fill="#f59e0b" font-family="Noto Sans CJK SC, sans-serif" font-size="13" font-weight="600">腾讯全家桶</text>
      <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-family="Noto Sans CJK SC, sans-serif" font-size="10">QClaw | WorkBuddy</text>
      <text x="0" y="25" text-anchor="middle" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="9">Lighthouse | 一键部署</text>
    </g>
  </g>
  <!-- Legend -->
  <g transform="translate(350, 400)">
    <circle cx="0" cy="-4" r="4" fill="#07c160"/>
    <text x="10" y="0" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">官方</text>
    <circle cx="60" cy="-4" r="4" fill="#3b82f6"/>
    <text x="70" y="0" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">企业</text>
    <circle cx="120" cy="-4" r="4" fill="#a855f7"/>
    <text x="130" y="0" fill="#64748b" font-family="Noto Sans CJK SC, sans-serif" font-size="10">社区</text>
  </g>
</svg>
