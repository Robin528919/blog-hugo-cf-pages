<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="380" fill="url(#bg4)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">多智能体分层模型策略</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">免费模型负责日常，付费模型兜底关键决策</text>

  <!-- Free tier label -->
  <rect x="30" y="80" width="580" height="275" rx="12" fill="none" stroke="#76b900" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.5"/>
  <rect x="45" y="72" width="100" height="20" rx="4" fill="#0f172a"/>
  <text x="95" y="86" text-anchor="middle" fill="#76b900" font-family="system-ui, sans-serif" font-size="12" font-weight="600">FREE 免费层</text>

  <!-- Agent Card 1: Customer Service -->
  <g transform="translate(55, 105)" filter="url(#shadow)">
    <rect width="250" height="105" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect width="250" height="4" rx="2" fill="#76b900" y="0"/>
    <text x="20" y="35" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">&#128172; 日常客服</text>
    <text x="20" y="58" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">模型：DeepSeek-V3.2 (685B)</text>
    <text x="20" y="78" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">通用对话 · 问题解答 · 信息检索</text>
    <rect x="170" y="62" width="65" height="22" rx="11" fill="#166534"/>
    <text x="202" y="78" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11" font-weight="600">$0</text>
  </g>

  <!-- Agent Card 2: Content Creator -->
  <g transform="translate(340, 105)" filter="url(#shadow)">
    <rect width="250" height="105" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect width="250" height="4" rx="2" fill="#8b5cf6" y="0"/>
    <text x="20" y="35" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">&#9999;&#65039; 内容创作</text>
    <text x="20" y="58" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">模型：Qwen 3.5-122B MoE</text>
    <text x="20" y="78" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">文案撰写 · 多语言翻译 · SEO 优化</text>
    <rect x="170" y="62" width="65" height="22" rx="11" fill="#166534"/>
    <text x="202" y="78" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11" font-weight="600">$0</text>
  </g>

  <!-- Agent Card 3: Data Analyst -->
  <g transform="translate(55, 235)" filter="url(#shadow)">
    <rect width="250" height="105" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect width="250" height="4" rx="2" fill="#3b82f6" y="0"/>
    <text x="20" y="35" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">&#128202; 数据分析</text>
    <text x="20" y="58" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">模型：DeepSeek-V3.1</text>
    <text x="20" y="78" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">数据报表 · 趋势分析 · 竞品调研</text>
    <rect x="170" y="62" width="65" height="22" rx="11" fill="#166534"/>
    <text x="202" y="78" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11" font-weight="600">$0</text>
  </g>

  <!-- Paid tier -->
  <rect x="630" y="80" width="245" height="275" rx="12" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.5"/>
  <rect x="645" y="72" width="100" height="20" rx="4" fill="#0f172a"/>
  <text x="695" y="86" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="12" font-weight="600">PRO 付费层</text>

  <!-- Agent Card 4: Strategy -->
  <g transform="translate(648, 105)" filter="url(#shadow)">
    <rect width="210" height="105" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <rect width="210" height="4" rx="2" fill="#f59e0b" y="0"/>
    <text x="20" y="35" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">&#127919; 战略决策</text>
    <text x="20" y="58" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">模型：Claude Sonnet</text>
    <text x="20" y="78" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">关键判断 · 复杂推理 · 兜底</text>
    <rect x="130" y="62" width="65" height="22" rx="11" fill="#78350f"/>
    <text x="162" y="78" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="11" font-weight="600">按需</text>
  </g>

  <!-- Arrow from free to paid -->
  <g transform="translate(340, 282)">
    <text x="150" y="0" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">需要深度推理时 →</text>
    <line x1="220" y1="-5" x2="295" y2="-50" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="295,-55 300,-42 289,-46" fill="#f59e0b" opacity="0.6"/>
  </g>
</svg>
