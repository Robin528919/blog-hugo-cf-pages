<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="nvidia" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="100%" style="stop-color:#a3e635"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/><line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="520" y1="0" x2="520" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- NVIDIA logo area -->
  <g transform="translate(80, 140)">
    <rect width="160" height="120" rx="16" fill="#1e293b" stroke="#76b900" stroke-width="2"/>
    <text x="80" y="50" text-anchor="middle" fill="#76b900" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">NVIDIA</text>
    <text x="80" y="75" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">NIM API</text>
    <text x="80" y="100" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="11">FREE</text>
  </g>

  <!-- Arrow 1 -->
  <g filter="url(#glow)">
    <line x1="260" y1="200" x2="370" y2="200" stroke="url(#nvidia)" stroke-width="2.5" stroke-dasharray="8 4"/>
    <polygon points="370,194 385,200 370,206" fill="#76b900"/>
  </g>

  <!-- OpenClaw box -->
  <g transform="translate(400, 120)">
    <rect width="200" height="160" rx="16" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="45" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="20" font-weight="bold">OpenClaw</text>
    <text x="100" y="70" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Gateway</text>
    <line x1="30" y1="88" x2="170" y2="88" stroke="#334155" stroke-width="1"/>
    <text x="100" y="110" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="11">models.providers</text>
    <text x="100" y="130" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="11">openai-completions</text>
    <text x="100" y="150" text-anchor="middle" fill="#475569" font-family="ui-monospace, monospace" font-size="10">integrate.api.nvidia.com</text>
  </g>

  <!-- Arrow 2 -->
  <g filter="url(#glow)">
    <line x1="620" y1="200" x2="730" y2="200" stroke="url(#accent)" stroke-width="2.5" stroke-dasharray="8 4"/>
    <polygon points="730,194 745,200 730,206" fill="#8b5cf6"/>
  </g>

  <!-- Agent boxes -->
  <g transform="translate(760, 100)">
    <!-- Agent 1 -->
    <rect width="150" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="75" y="28" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Agent A</text>
    <text x="75" y="48" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="10">DeepSeek V3.2</text>
  </g>
  <g transform="translate(760, 175)">
    <!-- Agent 2 -->
    <rect width="150" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="75" y="28" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Agent B</text>
    <text x="75" y="48" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="10">Qwen 3.5-122B</text>
  </g>
  <g transform="translate(760, 250)">
    <!-- Agent 3 -->
    <rect width="150" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="75" y="28" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Agent C</text>
    <text x="75" y="48" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="10">Nemotron 120B</text>
  </g>

  <!-- Title area -->
  <text x="600" y="38" text-anchor="middle" fill="#76b900" font-family="ui-monospace, monospace" font-size="14" opacity="0.8">// nvidia × openclaw</text>
  <text x="600" y="375" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="13">NVIDIA NIM Free API → OpenClaw Gateway → Multi-Agent</text>

  <!-- Cost badge -->
  <g transform="translate(1020, 140)">
    <rect width="100" height="36" rx="18" fill="#166534" opacity="0.9"/>
    <text x="50" y="24" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">$0 / 月</text>
  </g>
</svg>
