<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Noto Sans CJK SC,system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Network/team connections pattern -->
  <g opacity="0.06">
    <!-- Central hub -->
    <circle cx="980" cy="200" r="50" stroke="#f97316" stroke-width="3" fill="none"/>
    <!-- Agent nodes -->
    <circle cx="850" cy="100" r="25" stroke="#22c55e" stroke-width="2" fill="none"/>
    <circle cx="1110" cy="120" r="25" stroke="#3b82f6" stroke-width="2" fill="none"/>
    <circle cx="1100" cy="300" r="25" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="860" cy="320" r="25" stroke="#ef4444" stroke-width="2" fill="none"/>
    <circle cx="980" cy="380" r="25" stroke="#eab308" stroke-width="2" fill="none"/>
    <!-- Connection lines -->
    <line x1="980" y1="200" x2="850" y2="100" stroke="#f97316" stroke-width="2"/>
    <line x1="980" y1="200" x2="1110" y2="120" stroke="#f97316" stroke-width="2"/>
    <line x1="980" y1="200" x2="1100" y2="300" stroke="#f97316" stroke-width="2"/>
    <line x1="980" y1="200" x2="860" y2="320" stroke="#f97316" stroke-width="2"/>
    <line x1="980" y1="200" x2="980" y2="380" stroke="#f97316" stroke-width="2"/>
  </g>

  <!-- Tag -->
  <rect x="60" y="120" width="200" height="36" rx="18" fill="url(#accent)" opacity="0.15"/>
  <text x="160" y="144" fill="#f97316" font-size="16" font-weight="600" text-anchor="middle">跨境电商 × 多 Agent</text>

  <!-- Title -->
  <text x="60" y="210" fill="#ffffff" font-size="48" font-weight="800" letter-spacing="-1">
    <tspan x="60" dy="0">5 个 AI 员工</tspan>
    <tspan x="60" dy="65">跑通全平台跨境矩阵</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="340" fill="#94a3b8" font-size="20">选品 · VOC 分析 · GEO 优化 · Reddit 种草 · TikTok 带货</text>

  <!-- Agent role cards -->
  <g transform="translate(60, 390)">
    <rect width="150" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="75" y="36" fill="#22c55e" font-size="22" font-weight="800" text-anchor="middle">大总管</text>
    <text x="75" y="63" fill="#64748b" font-size="13" text-anchor="middle">需求拆解分发</text>
  </g>
  <g transform="translate(225, 390)">
    <rect width="150" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="75" y="36" fill="#3b82f6" font-size="22" font-weight="800" text-anchor="middle">VOC 分析</text>
    <text x="75" y="63" fill="#64748b" font-size="13" text-anchor="middle">用户痛点挖掘</text>
  </g>
  <g transform="translate(390, 390)">
    <rect width="150" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="75" y="36" fill="#8b5cf6" font-size="22" font-weight="800" text-anchor="middle">GEO 优化</text>
    <text x="75" y="63" fill="#64748b" font-size="13" text-anchor="middle">内容引擎优化</text>
  </g>
  <g transform="translate(555, 390)">
    <rect width="150" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="75" y="36" fill="#ef4444" font-size="22" font-weight="800" text-anchor="middle">Reddit</text>
    <text x="75" y="63" fill="#64748b" font-size="13" text-anchor="middle">养号种草引流</text>
  </g>

  <!-- Lobster icon -->
  <g transform="translate(850, 390)">
    <circle cx="70" cy="45" r="55" fill="#1e293b" stroke="#f97316" stroke-width="2" opacity="0.8"/>
    <text x="70" y="62" font-size="50" text-anchor="middle">🦞</text>
  </g>

  <!-- Brand -->
  <text x="60" y="545" fill="#475569" font-size="16">OpenClaw · 多 Agent 跨境电商流水线</text>
  <text x="60" y="575" fill="#334155" font-size="14">blog.es007.com</text>
</svg>
