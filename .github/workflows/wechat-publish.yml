name: 发布文章到微信公众号

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**'
  workflow_dispatch:
    inputs:
      publish_all:
        description: '扫描并发布所有未发布文章'
        required: false
        type: boolean
        default: false
      force:
        description: '强制重新发布（删除旧草稿并重建）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  wechat-publish:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装系统依赖（cairosvg + 中文字体）
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libffi-dev fonts-noto-cjk
          fc-cache -fv

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 Python 依赖
        run: pip install -r scripts/wechat/requirements.txt

      - name: 发布到微信草稿箱
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_PROXY_URL: http://182.92.95.178/wechat-api
          WECHAT_PROXY_KEY: ${{ secrets.WECHAT_PROXY_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          if [ "${{ inputs.publish_all }}" = "true" ]; then
            python scripts/wechat/publish.py --all $FORCE_FLAG --project-root .
          else
            python scripts/wechat/publish.py --base-ref HEAD~1 --project-root .
          fi

      - name: 提交发布状态
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/wechat/wechat_published.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: 更新微信发布状态"
            git pull --rebase origin main
            git push
          else
            echo "发布状态无变化，跳过提交"
          fi
