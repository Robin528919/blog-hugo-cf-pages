<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #141415;
        --border: #27272a;
        --text: #fafafa;
        --sub: #a1a1aa;
        --accent: #3b82f6;
        --accent-dim: rgba(59, 130, 246, 0.12);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }
      a { color: inherit; text-decoration: none; }
      .header {
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
      }
      .header-inner {
        max-width: 720px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
      }
      .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
      .nav-links { display: flex; gap: 24px; }
      .nav-links a { color: var(--sub); font-size: 14px; transition: color 0.2s; }
      .nav-links a:hover { color: var(--text); }
      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }
      .page-title {
        font-size: clamp(24px, 5vw, 32px);
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 32px;
      }
      .post-list { display: flex; flex-direction: column; gap: 2px; }
      .post-item {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 16px;
        border-radius: 10px;
        transition: background 0.2s;
      }
      .post-item:hover { background: var(--surface); }
      .post-content { flex: 1; min-width: 0; }
      .post-title {
        font-size: 16px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .post-tags { display: flex; gap: 6px; margin-top: 6px; }
      .post-tag {
        font-size: 12px;
        color: var(--accent);
        background: var(--accent-dim);
        padding: 2px 8px;
        border-radius: 4px;
      }
      .post-date {
        font-size: 13px;
        color: var(--sub);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .empty { text-align: center; padding: 64px 0; color: var(--sub); }
      .footer {
        border-top: 1px solid var(--border);
        padding: 24px;
        text-align: center;
        color: var(--sub);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a class="logo" href="/">{{ .Site.Title }}</a>
        <nav class="nav-links">
          <a href="/">首页</a>
          <a href="/posts/">文章</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1 class="page-title">{{ .Title }}</h1>
      <div class="post-list">
        {{ if .Pages }}
          {{ range .Pages.ByDate.Reverse }}
          <a class="post-item" href="{{ .Permalink }}">
            <div class="post-content">
              <div class="post-title">{{ .Title }}</div>
              {{ with .Params.tags }}
              <div class="post-tags">
                {{ range first 3 . }}
                <span class="post-tag">{{ . }}</span>
                {{ end }}
              </div>
              {{ end }}
            </div>
            <time class="post-date">{{ .Date.Format "2006-01-02" }}</time>
          </a>
          {{ end }}
        {{ else }}
          <div class="empty">暂无文章</div>
        {{ end }}
      </div>
    </main>

    <footer class="footer">
      &copy; {{ now.Year }} {{ .Site.Title }}
    </footer>
  </body>
</html>
