{{ define "head" }}
<style>
  a { color: inherit; text-decoration: none; }
  .page-title {
    font-size: clamp(24px, 5vw, 32px);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 32px;
  }
  .empty { text-align: center; padding: 64px 0; color: var(--sub); }
</style>
{{ end }}

{{ define "main" }}
<h1 class="page-title">{{ .Title }}</h1>
<div class="post-list">
  {{ if .Pages }}
    {{ range .Pages.ByDate.Reverse }}
    <a class="post-item" href="{{ .Permalink }}">
      <div class="post-content">
        <div class="post-title">{{ .Title }}</div>
        {{ with .Params.tags }}
        <div class="post-tags">
          {{ range first 3 . }}
          <span class="post-tag">{{ . }}</span>
          {{ end }}
        </div>
        {{ end }}
      </div>
      <time class="post-date">{{ .Date.Format "2006-01-02" }}</time>
    </a>
    {{ end }}
  {{ else }}
    <div class="empty">暂无文章</div>
  {{ end }}
</div>
{{ end }}
