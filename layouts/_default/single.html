{{ define "head" }}
<style>
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .nav-links a { color: var(--sub); }
  .nav-links a:hover { text-decoration: none; }

  .article-header { margin-bottom: 40px; }
  .article-header h1 {
    font-size: clamp(24px, 5vw, 32px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.3;
    margin-bottom: 16px;
  }
  .article-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--sub);
    font-size: 14px;
  }
  .article-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .article-tag {
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* content */
  .article-content { font-size: 16px; color: var(--content-text); line-height: 1.8; }
  .article-content h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin: 40px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .article-content h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin: 32px 0 12px;
  }
  .article-content p { margin: 16px 0; }
  .article-content ul, .article-content ol {
    margin: 16px 0;
    padding-left: 24px;
  }
  .article-content li { margin: 6px 0; }
  .article-content strong { color: var(--text); }
  .article-content blockquote {
    margin: 20px 0;
    padding: 12px 20px;
    border-left: 3px solid var(--accent);
    background: var(--surface);
    border-radius: 0 8px 8px 0;
    color: var(--sub);
  }
  .article-content code {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.9em;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .article-content pre {
    margin: 20px 0;
    padding: 20px;
    background: var(--code-bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow-x: auto;
  }
  .article-content pre code {
    background: none;
    padding: 0;
    font-size: 14px;
    line-height: 1.6;
  }
  .article-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 40px 0;
  }

  /* tables */
  .article-content table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 20px 0;
    font-size: 14px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .article-content thead th {
    background: var(--surface);
    color: var(--sub);
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .article-content tbody td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--content-text);
    vertical-align: top;
  }
  .article-content tbody tr:last-child td {
    border-bottom: none;
  }
  .article-content tbody tr:hover {
    background: var(--surface);
  }
  .article-content tbody td code {
    font-size: 12px;
    word-break: break-all;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 48px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    color: var(--sub);
    border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .back-link:hover {
    color: var(--text);
    background: var(--surface);
    text-decoration: none;
  }

  /* images */
  .article-content img {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: zoom-in;
    transition: opacity 0.2s;
  }
  .article-content img:hover { opacity: 0.9; }

  /* lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
    padding: 24px;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 95vw;
    max-height: 92vh;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    object-fit: contain;
  }
  .lightbox-close {
    position: fixed;
    top: 16px;
    right: 20px;
    width: 36px;
    height: 36px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.15); }
</style>
{{ end }}

{{ define "main" }}
<article>
  <div class="article-header">
    <h1>{{ .Title }}</h1>
    <div class="article-meta">
      <time>{{ .Date.Format "2006-01-02" }}</time>
      {{ with .Params.tags }}
      <div class="article-tags">
        {{ range . }}
        <span class="article-tag">{{ . }}</span>
        {{ end }}
      </div>
      {{ end }}
    </div>
  </div>
  <div class="article-content">
    {{ .Content }}
  </div>
</article>
<a class="back-link" href="/">&larr; 返回首页</a>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" aria-label="关闭">&times;</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
(function(){
  var box = document.getElementById('lightbox');
  var boxImg = document.getElementById('lightbox-img');
  var imgs = document.querySelectorAll('.article-content img');

  imgs.forEach(function(img){
    img.addEventListener('click', function(){
      boxImg.src = img.src;
      boxImg.alt = img.alt;
      box.classList.add('active');
      document.body.style.overflow = 'hidden';
    });
  });

  function close(){
    box.classList.remove('active');
    document.body.style.overflow = '';
  }

  box.addEventListener('click', function(e){
    if(e.target !== boxImg) close();
  });

  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') close();
  });
})();
</script>
{{ end }}
