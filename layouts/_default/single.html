<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #141415;
        --border: #27272a;
        --text: #fafafa;
        --sub: #a1a1aa;
        --accent: #3b82f6;
        --accent-dim: rgba(59, 130, 246, 0.12);
        --code-bg: #1e1e21;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.8;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* header */
      .header {
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
      }
      .header-inner {
        max-width: 720px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
      }
      .logo {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text);
      }
      .nav-links { display: flex; gap: 24px; }
      .nav-links a {
        color: var(--sub);
        font-size: 14px;
        transition: color 0.2s;
      }
      .nav-links a:hover { color: var(--text); text-decoration: none; }

      /* article */
      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }
      .article-header { margin-bottom: 40px; }
      .article-header h1 {
        font-size: clamp(24px, 5vw, 32px);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.3;
        margin-bottom: 16px;
      }
      .article-meta {
        display: flex;
        align-items: center;
        gap: 16px;
        color: var(--sub);
        font-size: 14px;
      }
      .article-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .article-tag {
        font-size: 12px;
        color: var(--accent);
        background: var(--accent-dim);
        padding: 2px 8px;
        border-radius: 4px;
      }

      /* content */
      .article-content { font-size: 16px; color: #d4d4d8; }
      .article-content h2 {
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
        margin: 40px 0 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .article-content h3 {
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        margin: 32px 0 12px;
      }
      .article-content p { margin: 16px 0; }
      .article-content ul, .article-content ol {
        margin: 16px 0;
        padding-left: 24px;
      }
      .article-content li { margin: 6px 0; }
      .article-content strong { color: var(--text); }
      .article-content blockquote {
        margin: 20px 0;
        padding: 12px 20px;
        border-left: 3px solid var(--accent);
        background: var(--surface);
        border-radius: 0 8px 8px 0;
        color: var(--sub);
      }
      .article-content code {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.9em;
        background: var(--code-bg);
        padding: 2px 6px;
        border-radius: 4px;
        color: #e4e4e7;
      }
      .article-content pre {
        margin: 20px 0;
        padding: 20px;
        background: var(--code-bg);
        border-radius: 10px;
        border: 1px solid var(--border);
        overflow-x: auto;
      }
      .article-content pre code {
        background: none;
        padding: 0;
        font-size: 14px;
        line-height: 1.6;
      }
      .article-content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 40px 0;
      }

      /* back link */
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 48px;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        color: var(--sub);
        border: 1px solid var(--border);
        transition: all 0.2s;
      }
      .back-link:hover {
        color: var(--text);
        background: var(--surface);
        text-decoration: none;
      }

      /* footer */
      .footer {
        border-top: 1px solid var(--border);
        padding: 24px;
        text-align: center;
        color: var(--sub);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a class="logo" href="/">{{ .Site.Title }}</a>
        <nav class="nav-links">
          <a href="/">首页</a>
          <a href="/posts/">文章</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <article>
        <div class="article-header">
          <h1>{{ .Title }}</h1>
          <div class="article-meta">
            <time>{{ .Date.Format "2006-01-02" }}</time>
            {{ with .Params.tags }}
            <div class="article-tags">
              {{ range . }}
              <span class="article-tag">{{ . }}</span>
              {{ end }}
            </div>
            {{ end }}
          </div>
        </div>
        <div class="article-content">
          {{ .Content }}
        </div>
      </article>
      <a class="back-link" href="/">&larr; 返回首页</a>
    </main>

    <footer class="footer">
      &copy; {{ now.Year }} {{ .Site.Title }}
    </footer>
  </body>
</html>
