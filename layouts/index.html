<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Site.Title }}</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --sub: #94a3b8;
        --ok: #22c55e;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background: radial-gradient(circle at 20% 20%, #1e293b 0%, var(--bg) 55%);
        color: var(--text);
      }
      .card {
        width: min(760px, 92vw);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(17, 24, 39, 0.9);
        padding: 28px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 40px);
      }
      p {
        margin: 8px 0;
        color: var(--sub);
        line-height: 1.7;
      }
      .tag {
        display: inline-block;
        margin-top: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.35);
        color: var(--ok);
        font-size: 14px;
      }
      code {
        background: rgba(148, 163, 184, 0.2);
        border-radius: 6px;
        padding: 2px 6px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>{{ .Site.Title }}</h1>
      <p>{{ .Content }}</p>
      <p>构建命令：<code>hugo --gc --minify</code></p>
      <span class="tag">Cloudflare Pages 自动部署已接入</span>
    </main>
  </body>
</html>
