<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="-apple-system, PingFang SC, sans-serif">
  <defs>
    <style>
      .frame { fill: #0a0a0b; stroke: #27272a; stroke-width: 1; }
      .block { fill: #141415; stroke: #27272a; stroke-width: 1; rx: 8; }
      .accent { fill: #3b82f6; }
      .accent-dim { fill: rgba(59,130,246,0.12); stroke: #3b82f6; stroke-width: 0.5; }
      .label { fill: #a1a1aa; font-size: 11px; }
      .title { fill: #fafafa; font-weight: 700; }
      .sub { fill: #71717a; font-size: 10px; }
      .dim { fill: #52525b; }
      .sep { stroke: #27272a; stroke-width: 1; }
    </style>
  </defs>

  <!-- ========== 首页 ========== -->
  <g transform="translate(20, 20)">
    <!-- page label -->
    <text class="label" x="0" y="-6" font-size="13" font-weight="600" fill="#fafafa">首页 /</text>

    <!-- outer frame -->
    <rect class="frame" x="0" y="0" width="400" height="660" rx="12"/>

    <!-- header -->
    <rect fill="#0f0f10" x="0" y="0" width="400" height="48" rx="12"/>
    <rect fill="#0f0f10" x="0" y="12" width="400" height="36"/>
    <text class="title" x="24" y="30" font-size="15">Hugo 博客</text>
    <text class="label" x="300" y="30">首页</text>
    <text class="label" x="345" y="30">文章</text>
    <line class="sep" x1="0" y1="48" x2="400" y2="48"/>

    <!-- hero -->
    <text class="title" x="56" y="100" font-size="22">Hugo 博客</text>
    <rect fill="#27272a" x="56" y="114" width="220" height="8" rx="4"/>
    <text class="sub" x="56" y="112"><!-- description placeholder --></text>

    <!-- section title -->
    <text class="label" x="56" y="168" font-size="11" letter-spacing="1" text-transform="uppercase">最新文章</text>

    <!-- post item 1 -->
    <rect class="block" x="40" y="182" width="320" height="64"/>
    <rect fill="#27272a" x="56" y="196" width="200" height="10" rx="4"/>
    <rect class="accent-dim" x="56" y="216" width="28" height="14" rx="3"/>
    <rect class="accent-dim" x="90" y="216" width="48" height="14" rx="3"/>
    <rect class="accent-dim" x="144" y="216" width="40" height="14" rx="3"/>
    <text class="sub" x="300" y="206">2026-03-07</text>

    <!-- post item 2 -->
    <rect class="block" x="40" y="254" width="320" height="64"/>
    <rect fill="#27272a" x="56" y="268" width="170" height="10" rx="4"/>
    <rect class="accent-dim" x="56" y="288" width="36" height="14" rx="3"/>
    <rect class="accent-dim" x="98" y="288" width="42" height="14" rx="3"/>
    <text class="sub" x="300" y="278">2026-03-06</text>

    <!-- post item 3 -->
    <rect class="block" x="40" y="326" width="320" height="64"/>
    <rect fill="#27272a" x="56" y="340" width="240" height="10" rx="4"/>
    <rect class="accent-dim" x="56" y="360" width="32" height="14" rx="3"/>
    <text class="sub" x="300" y="350">2026-03-05</text>

    <!-- post item 4 (faded) -->
    <rect class="block" x="40" y="398" width="320" height="64" opacity="0.4"/>
    <rect fill="#27272a" x="56" y="412" width="180" height="10" rx="4" opacity="0.4"/>
    <text class="sub" x="300" y="422" opacity="0.4">2026-03-04</text>

    <!-- dots -->
    <text class="dim" x="190" y="490" font-size="16" text-anchor="middle">...</text>

    <!-- footer -->
    <line class="sep" x1="0" y1="612" x2="400" y2="612"/>
    <text class="sub" x="152" y="636" text-anchor="middle">&#169; 2026 Hugo 博客</text>

    <!-- annotations -->
    <line stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4" x1="400" y1="24" x2="430" y2="24"/>
    <text class="accent" x="436" y="28" font-size="10">Header 导航栏 56px</text>

    <line stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4" x1="400" y1="100" x2="430" y2="100"/>
    <text class="accent" x="436" y="104" font-size="10">Hero 标题 + 描述</text>

    <line stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4" x1="400" y1="214" x2="430" y2="214"/>
    <text class="accent" x="436" y="218" font-size="10">文章卡片：标题 + 标签 + 日期</text>

    <line stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="4" x1="400" y1="624" x2="430" y2="624"/>
    <text class="accent" x="436" y="628" font-size="10">Footer 页脚</text>
  </g>

  <!-- ========== 文章详情页 ========== -->
  <g transform="translate(480, 20)">
    <!-- page label -->
    <text class="label" x="0" y="-6" font-size="13" font-weight="600" fill="#fafafa">文章详情 /posts/xxx/</text>

    <!-- outer frame -->
    <rect class="frame" x="0" y="0" width="400" height="660" rx="12"/>

    <!-- header -->
    <rect fill="#0f0f10" x="0" y="0" width="400" height="48" rx="12"/>
    <rect fill="#0f0f10" x="0" y="12" width="400" height="36"/>
    <text class="title" x="24" y="30" font-size="15">Hugo 博客</text>
    <text class="label" x="300" y="30">首页</text>
    <text class="label" x="345" y="30">文章</text>
    <line class="sep" x1="0" y1="48" x2="400" y2="48"/>

    <!-- article title -->
    <rect fill="#27272a" x="56" y="84" width="280" height="14" rx="4"/>
    <rect fill="#27272a" x="56" y="106" width="180" height="14" rx="4"/>

    <!-- meta: date + tags -->
    <text class="sub" x="56" y="144">2026-03-07</text>
    <rect class="accent-dim" x="130" y="133" width="28" height="14" rx="3"/>
    <rect class="accent-dim" x="164" y="133" width="48" height="14" rx="3"/>
    <rect class="accent-dim" x="218" y="133" width="52" height="14" rx="3"/>

    <!-- h2 -->
    <rect fill="#3b82f6" x="56" y="176" width="4" height="14" rx="2"/>
    <rect fill="#27272a" x="68" y="176" width="160" height="14" rx="4"/>
    <line class="sep" x1="56" y1="198" x2="340" y2="198"/>

    <!-- paragraph -->
    <rect fill="#1e1e21" x="56" y="214" width="284" height="8" rx="3"/>
    <rect fill="#1e1e21" x="56" y="230" width="260" height="8" rx="3"/>
    <rect fill="#1e1e21" x="56" y="246" width="274" height="8" rx="3"/>
    <rect fill="#1e1e21" x="56" y="262" width="200" height="8" rx="3"/>

    <!-- code block -->
    <rect fill="#1e1e21" x="56" y="290" width="284" height="72" rx="8" stroke="#27272a" stroke-width="1"/>
    <rect fill="#27272a" x="72" y="306" width="180" height="6" rx="3"/>
    <rect fill="#27272a" x="72" y="320" width="220" height="6" rx="3"/>
    <rect fill="#27272a" x="72" y="334" width="150" height="6" rx="3"/>

    <!-- paragraph -->
    <rect fill="#1e1e21" x="56" y="382" width="270" height="8" rx="3"/>
    <rect fill="#1e1e21" x="56" y="398" width="284" height="8" rx="3"/>
    <rect fill="#1e1e21" x="56" y="414" width="230" height="8" rx="3"/>

    <!-- blockquote -->
    <rect fill="#141415" x="56" y="442" width="284" height="48" rx="0 8 8 0"/>
    <rect fill="#3b82f6" x="56" y="442" width="3" height="48"/>
    <rect fill="#27272a" x="76" y="456" width="240" height="6" rx="3"/>
    <rect fill="#27272a" x="76" y="470" width="180" height="6" rx="3"/>

    <!-- list items -->
    <circle fill="#3b82f6" cx="64" cy="518" r="3"/>
    <rect fill="#1e1e21" x="76" y="514" width="220" height="8" rx="3"/>
    <circle fill="#3b82f6" cx="64" cy="538" r="3"/>
    <rect fill="#1e1e21" x="76" y="534" width="200" height="8" rx="3"/>
    <circle fill="#3b82f6" cx="64" cy="558" r="3"/>
    <rect fill="#1e1e21" x="76" y="554" width="240" height="8" rx="3"/>

    <!-- back button -->
    <rect fill="#141415" x="56" y="584" width="100" height="30" rx="8" stroke="#27272a" stroke-width="1"/>
    <text class="sub" x="78" y="604" font-size="12">&#8592; 返回首页</text>

    <!-- footer -->
    <line class="sep" x1="0" y1="632" x2="400" y2="632"/>
    <text class="sub" x="152" y="652" text-anchor="middle">&#169; 2026 Hugo 博客</text>
  </g>
</svg>
