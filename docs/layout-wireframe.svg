  <!-- ==================== ANNOTATIONS ==================== -->

  <!-- Home annotations -->
  <g transform="translate(60, 80)">
    <!-- header -->
    <circle cx="498" cy="64" r="4" fill="url(#dotGrad)"/>
    <line x1="502" y1="64" x2="520" y2="64" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3"/>
    <text x="526" y="68" fill="#60a5fa" font-size="10" font-weight="500">Header &#183; sticky &#183; 56px</text>

    <!-- hero -->
    <circle cx="498" cy="136" r="4" fill="url(#dotGrad)"/>
    <line x1="502" y1="136" x2="520" y2="136" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3"/>
    <text x="526" y="140" fill="#60a5fa" font-size="10" font-weight="500">Hero &#183; title + description</text>

    <!-- card -->
    <circle cx="498" cy="258" r="4" fill="url(#dotGrad)"/>
    <line x1="502" y1="258" x2="520" y2="258" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3"/>
    <text x="526" y="254" fill="#60a5fa" font-size="10" font-weight="500">Post Card &#183; accent bar</text>
    <text x="526" y="268" fill="#475569" font-size="9">title + tags + date</text>

    <!-- toggle -->
    <circle cx="498" cy="69" r="4" fill="url(#dotGrad)"/>
    <line x1="476" y1="69" x2="498" y2="69" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3"/>
  </g>

  <!-- Article annotations -->
  <g transform="translate(660, 80)">
    <!-- code block -->
    <circle cx="498" cy="364" r="4" fill="#a78bfa"/>
    <line x1="502" y1="364" x2="520" y2="364" stroke="#8b5cf6" stroke-width="0.8" stroke-dasharray="3"/>
    <text x="526" y="360" fill="#a78bfa" font-size="10" font-weight="500">Code Block</text>
    <text x="526" y="374" fill="#475569" font-size="9">syntax highlight ready</text>

    <!-- blockquote -->
    <circle cx="498" cy="510" r="4" fill="#a78bfa"/>
    <line x1="502" y1="510" x2="520" y2="510" stroke="#8b5cf6" stroke-width="0.8" stroke-dasharray="3"/>
    <text x="526" y="514" fill="#a78bfa" font-size="10" font-weight="500">Blockquote &#183; accent bar</text>
  </g>

  <!-- ==================== DESIGN SYSTEM STRIP ==================== -->
  <g transform="translate(60, 845)">
    <text x="0" y="0" fill="#475569" font-size="10" letter-spacing="0.1em">PALETTE</text>
    <!-- color chips -->
    <rect x="60" y="-10" width="24" height="12" rx="3" fill="#0a0a0b"/><text x="90" y="0" fill="#64748b" font-size="9">bg</text>
    <rect x="110" y="-10" width="24" height="12" rx="3" fill="#f8fafc"/><text x="140" y="0" fill="#64748b" font-size="9">light</text>
    <rect x="168" y="-10" width="24" height="12" rx="3" fill="#3b82f6"/><text x="198" y="0" fill="#64748b" font-size="9">accent</text>
    <rect x="234" y="-10" width="24" height="12" rx="3" fill="#8b5cf6"/><text x="264" y="0" fill="#64748b" font-size="9">purple</text>
    <rect x="300" y="-10" width="24" height="12" rx="3" fill="#1e293b"/><text x="330" y="0" fill="#64748b" font-size="9">surface</text>

    <text x="400" y="0" fill="#475569" font-size="10" letter-spacing="0.1em">FONT</text>
    <text x="440" y="0" fill="#94a3b8" font-size="10">System + PingFang SC</text>

    <text x="620" y="0" fill="#475569" font-size="10" letter-spacing="0.1em">THEME</text>
    <text x="670" y="0" fill="#94a3b8" font-size="10">Dark / Light &#183; localStorage</text>

    <text x="860" y="0" fill="#475569" font-size="10" letter-spacing="0.1em">MAX-W</text>
    <text x="910" y="0" fill="#94a3b8" font-size="10">720px</text>
