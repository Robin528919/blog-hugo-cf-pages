<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'SF Pro Display', -apple-system, 'PingFang SC', sans-serif">
  <defs>
    <!-- background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <!-- accent gradient -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- card glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- soft shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- annotation dot -->
    <radialGradient id="dotGrad">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>
  </defs>

  <!-- ====== CANVAS ====== -->
  <rect width="1200" height="900" fill="url(#bgGrad)" rx="16"/>

  <!-- title bar -->
  <text x="600" y="44" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="500" letter-spacing="0.15em">E.S BLOG &#8212; LAYOUT WIREFRAME</text>
  <line x1="440" y1="54" x2="760" y2="54" stroke="url(#accentGrad)" stroke-width="1" opacity="0.4"/>

  <!-- ==================== HOME PAGE ==================== -->
  <g transform="translate(60, 80)">
    <!-- label -->
    <text x="0" y="-12" fill="#60a5fa" font-size="11" font-weight="600" letter-spacing="0.1em">HOME /</text>

    <!-- device frame -->
    <rect width="480" height="740" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- browser dots -->
    <circle cx="24" cy="20" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="42" cy="20" r="5" fill="#eab308" opacity="0.8"/>
    <circle cx="60" cy="20" r="5" fill="#22c55e" opacity="0.8"/>
    <rect x="100" y="13" width="280" height="14" rx="7" fill="#1e293b"/>
    <text x="240" y="24" text-anchor="middle" fill="#475569" font-size="9">blog.es007.com</text>

    <!-- ── HEADER ── -->
    <rect x="0" y="40" width="480" height="48" fill="#0f172a"/>
    <line x1="0" y1="88" x2="480" y2="88" stroke="#1e293b" stroke-width="1"/>
    <text x="40" y="70" fill="#f8fafc" font-size="16" font-weight="700">E.S &#21338;&#23458;</text>
    <text x="340" y="70" fill="#64748b" font-size="12">&#39318;&#39029;</text>
    <text x="385" y="70" fill="#64748b" font-size="12">&#25991;&#31456;</text>
    <!-- theme toggle -->
    <rect x="430" y="55" width="28" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <circle cx="444" cy="69" r="6" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="444" y1="60" x2="444" y2="63" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="444" y1="75" x2="444" y2="78" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="435" y1="69" x2="438" y2="69" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="450" y1="69" x2="453" y2="69" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- ── HERO ── -->
    <text x="40" y="136" fill="#f8fafc" font-size="28" font-weight="800" letter-spacing="-0.03em">E.S &#21338;&#23458;</text>
    <rect x="40" y="152" width="260" height="10" rx="5" fill="#334155" opacity="0.5"/>

    <!-- ── SECTION TITLE ── -->
    <text x="40" y="206" fill="#64748b" font-size="11" font-weight="600" letter-spacing="0.12em">&#26368;&#26032;&#25991;&#31456;</text>

    <!-- ── POST CARD 1 ── -->
    <rect x="28" y="222" width="424" height="72" rx="10" fill="#1e293b" opacity="0.6"/>
    <rect x="28" y="222" width="3" height="72" rx="1.5" fill="url(#accentGrad)"/>
    <!-- title -->
    <rect x="48" y="238" width="280" height="12" rx="4" fill="#cbd5e1"/>
    <!-- tags -->
    <rect x="48" y="260" width="30" height="16" rx="4" fill="#1e3a5f"/>
    <text x="63" y="272" text-anchor="middle" fill="#60a5fa" font-size="9">AI</text>
    <rect x="84" y="260" width="64" height="16" rx="4" fill="#1e3a5f"/>
    <text x="116" y="272" text-anchor="middle" fill="#60a5fa" font-size="9">OpenClaw</text>
    <rect x="154" y="260" width="52" height="16" rx="4" fill="#1e3a5f"/>
    <text x="180" y="272" text-anchor="middle" fill="#60a5fa" font-size="9">&#36328;&#22659;&#30005;&#21830;</text>
    <!-- date -->
    <text x="408" y="252" fill="#475569" font-size="11" text-anchor="end">2026-03-07</text>

    <!-- ── POST CARD 2 ── -->
    <rect x="28" y="302" width="424" height="72" rx="10" fill="#1e293b" opacity="0.4"/>
    <rect x="28" y="302" width="3" height="72" rx="1.5" fill="#334155"/>
    <rect x="48" y="318" width="220" height="12" rx="4" fill="#94a3b8" opacity="0.5"/>
    <rect x="48" y="340" width="40" height="16" rx="4" fill="#1e293b"/>
    <rect x="94" y="340" width="56" height="16" rx="4" fill="#1e293b"/>
    <text x="408" y="332" fill="#475569" font-size="11" text-anchor="end" opacity="0.6">2026-03-06</text>

    <!-- ── POST CARD 3 ── -->
    <rect x="28" y="382" width="424" height="72" rx="10" fill="#1e293b" opacity="0.25"/>
    <rect x="28" y="382" width="3" height="72" rx="1.5" fill="#334155" opacity="0.5"/>
    <rect x="48" y="398" width="260" height="12" rx="4" fill="#94a3b8" opacity="0.3"/>
    <rect x="48" y="420" width="48" height="16" rx="4" fill="#1e293b" opacity="0.5"/>
    <text x="408" y="412" fill="#475569" font-size="11" text-anchor="end" opacity="0.4">2026-03-05</text>

    <!-- fade dots -->
    <circle cx="240" cy="480" r="2" fill="#475569" opacity="0.4"/>
    <circle cx="252" cy="480" r="2" fill="#475569" opacity="0.3"/>
    <circle cx="264" cy="480" r="2" fill="#475569" opacity="0.2"/>

    <!-- ── FOOTER ── -->
    <line x1="0" y1="700" x2="480" y2="700" stroke="#1e293b" stroke-width="1"/>
    <text x="240" y="724" text-anchor="middle" fill="#475569" font-size="11">&#169; 2026 E.S &#21338;&#23458;</text>
  </g>

  <!-- ==================== ARTICLE PAGE ==================== -->
  <g transform="translate(660, 80)">
    <!-- label -->
    <text x="0" y="-12" fill="#a78bfa" font-size="11" font-weight="600" letter-spacing="0.1em">ARTICLE /posts/xxx/</text>

    <!-- device frame -->
    <rect width="480" height="740" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- browser dots -->
    <circle cx="24" cy="20" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="42" cy="20" r="5" fill="#eab308" opacity="0.8"/>
    <circle cx="60" cy="20" r="5" fill="#22c55e" opacity="0.8"/>
    <rect x="100" y="13" width="280" height="14" rx="7" fill="#1e293b"/>
    <text x="240" y="24" text-anchor="middle" fill="#475569" font-size="9">blog.es007.com/posts/xxx</text>

    <!-- ── HEADER ── -->
    <rect x="0" y="40" width="480" height="48" fill="#0f172a"/>
    <line x1="0" y1="88" x2="480" y2="88" stroke="#1e293b" stroke-width="1"/>
    <text x="40" y="70" fill="#f8fafc" font-size="16" font-weight="700">E.S &#21338;&#23458;</text>
    <text x="340" y="70" fill="#64748b" font-size="12">&#39318;&#39029;</text>
    <text x="385" y="70" fill="#64748b" font-size="12">&#25991;&#31456;</text>
    <rect x="430" y="55" width="28" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <circle cx="444" cy="69" r="6" fill="none" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- ── ARTICLE TITLE ── -->
    <rect x="40" y="112" width="360" height="16" rx="5" fill="#e2e8f0"/>
    <rect x="40" y="136" width="240" height="16" rx="5" fill="#cbd5e1" opacity="0.7"/>

    <!-- meta: date + tags -->
    <text x="40" y="176" fill="#64748b" font-size="11">2026-03-07</text>
    <rect x="120" y="164" width="30" height="16" rx="4" fill="#1e3a5f"/>
    <text x="135" y="176" text-anchor="middle" fill="#60a5fa" font-size="9">AI</text>
    <rect x="156" y="164" width="64" height="16" rx="4" fill="#1e3a5f"/>
    <text x="188" y="176" text-anchor="middle" fill="#60a5fa" font-size="9">OpenClaw</text>
    <rect x="226" y="164" width="60" height="16" rx="4" fill="#1e3a5f"/>
    <text x="256" y="176" text-anchor="middle" fill="#60a5fa" font-size="9">&#22810;Agent</text>

    <!-- ── H2 HEADING ── -->
    <rect x="40" y="210" width="4" height="16" rx="2" fill="url(#accentGrad)"/>
    <rect x="54" y="210" width="200" height="16" rx="5" fill="#cbd5e1" opacity="0.6"/>
    <line x1="40" y1="234" x2="420" y2="234" stroke="#1e293b" stroke-width="1"/>

    <!-- ── PARAGRAPH ── -->
    <rect x="40" y="252" width="380" height="8" rx="4" fill="#475569" opacity="0.4"/>
    <rect x="40" y="268" width="360" height="8" rx="4" fill="#475569" opacity="0.35"/>
    <rect x="40" y="284" width="340" height="8" rx="4" fill="#475569" opacity="0.3"/>
    <rect x="40" y="300" width="280" height="8" rx="4" fill="#475569" opacity="0.25"/>

    <!-- ── CODE BLOCK ── -->
    <rect x="40" y="324" width="400" height="80" rx="10" fill="#0c0c0e" stroke="#1e293b" stroke-width="1"/>
    <!-- code dots -->
    <circle cx="56" cy="338" r="3" fill="#ef4444" opacity="0.5"/>
    <circle cx="66" cy="338" r="3" fill="#eab308" opacity="0.5"/>
    <circle cx="76" cy="338" r="3" fill="#22c55e" opacity="0.5"/>
    <!-- code lines -->
    <rect x="56" y="352" width="160" height="6" rx="3" fill="#60a5fa" opacity="0.3"/>
    <rect x="56" y="364" width="240" height="6" rx="3" fill="#a78bfa" opacity="0.25"/>
    <rect x="56" y="376" width="200" height="6" rx="3" fill="#34d399" opacity="0.25"/>
    <rect x="56" y="388" width="120" height="6" rx="3" fill="#60a5fa" opacity="0.2"/>

    <!-- ── PARAGRAPH 2 ── -->
    <rect x="40" y="424" width="370" height="8" rx="4" fill="#475569" opacity="0.35"/>
    <rect x="40" y="440" width="390" height="8" rx="4" fill="#475569" opacity="0.3"/>
    <rect x="40" y="456" width="300" height="8" rx="4" fill="#475569" opacity="0.25"/>

    <!-- ── BLOCKQUOTE ── -->
    <rect x="40" y="484" width="400" height="52" rx="0" fill="#111827"/>
    <rect x="40" y="484" width="3" height="52" rx="1.5" fill="url(#accentGrad)"/>
    <rect x="60" y="500" width="320" height="7" rx="3.5" fill="#64748b" opacity="0.35"/>
    <rect x="60" y="516" width="260" height="7" rx="3.5" fill="#64748b" opacity="0.25"/>

    <!-- ── LIST ── -->
    <circle cx="50" cy="562" r="3" fill="url(#accentGrad)"/>
    <rect x="64" y="558" width="280" height="8" rx="4" fill="#475569" opacity="0.35"/>
    <circle cx="50" cy="582" r="3" fill="url(#accentGrad)"/>
    <rect x="64" y="578" width="240" height="8" rx="4" fill="#475569" opacity="0.3"/>
    <circle cx="50" cy="602" r="3" fill="url(#accentGrad)"/>
    <rect x="64" y="598" width="300" height="8" rx="4" fill="#475569" opacity="0.25"/>

